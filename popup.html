<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AEM Developer Tools</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <div id="header">
    <span class="title">Paylocity Web Team Tools</span>
    <div id="mode-chips">
      <span class="mode-chip chip-developer">DEV</span>
      <span class="mode-chip chip-admin">ADMIN</span>
    </div>
    <button id="btn-options" title="Open Options" aria-label="Open Options">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- ── Context bar ─────────────────────────────────────────────────────── -->
  <div id="context-bar">
    <span id="context-label">Not an AEM page</span>
    <span id="env-badge" hidden></span>
    <span id="client-cookie-badge" hidden></span>
  </div>

  <!-- ── Toolbar ─────────────────────────────────────────────────────────── -->
  <div id="toolbar">

    <!-- Left column: AEM Page Tools -->
    <div class="col">
      <div class="col-header">Page</div>

      <button id="btn-toggle-preview"       class="tool-btn needs-page"           title="Toggle between editor and preview mode">
        Toggle Preview
      </button>
      <button id="btn-go-to-author"         class="tool-btn needs-publish"        title="Open current page in Author editor">
        Go to Author
      </button>
      <div class="btn-row">
        <button id="btn-go-to-adobe-publish" class="tool-btn btn-icon needs-author" title="Open on Adobe Cloud Publish">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="currentColor" aria-hidden="true">
            <path d="M2 12.1333C2 8.58633 2 6.81283 2.69029 5.45806C3.29749 4.26637 4.26637 3.29749 5.45806 2.69029C6.81283 2 8.58633 2 12.1333 2H19.8667C23.4137 2 25.1872 2 26.5419 2.69029C27.7336 3.29749 28.7025 4.26637 29.3097 5.45806C30 6.81283 30 8.58633 30 12.1333V19.8667C30 23.4137 30 25.1872 29.3097 26.5419C28.7025 27.7336 27.7336 28.7025 26.5419 29.3097C25.1872 30 23.4137 30 19.8667 30H12.1333C8.58633 30 6.81283 30 5.45806 29.3097C4.26637 28.7025 3.29749 27.7336 2.69029 26.5419C2 25.1872 2 23.4137 2 19.8667V12.1333Z"
                  fill="#E6001F"></path>
            <path d="M7 23C7 23 13.2207 8.00393 13.2059 8C13.2059 8 13.2059 8 13.2059 8H13.2059H17.9301L25 23L19.6601 23C19.6641 23.0079 15.6563 13.7963 15.606 13.7037C15.5972 13.784 12.9484 19.9491 12.9164 19.9567H15.771C15.758 19.9724 17.0122 22.9714 17.0122 23L7 23Z"
                  fill="white"></path>
          </svg>
        </button>
        <button id="btn-go-to-publish"       class="tool-btn btn-row-fill needs-author" title="Open current page on Publish instance">
          Go to Publish
        </button>
      </div>
      <button id="btn-go-to-dam"            class="tool-btn needs-aem"            title="Go to Digital Asset Management">
        Go to DAM
      </button>
      <button id="btn-cache-bypass"         class="tool-btn needs-page"           title="Append cache-bust param to URL">
        Cache Bypass
      </button>
      <button id="btn-toggle-json"          class="tool-btn needs-developer needs-page" title="Toggle JCR content JSON view">
        Toggle JSON
      </button>
    </div>

    <!-- Middle column: Advanced Tools -->
    <div class="col">
      <div class="col-header">Advanced</div>

      <button id="btn-manage-publication"   class="tool-btn needs-page"           title="Open Manage Publication wizard">
        Manage Publication
      </button>
      <button id="btn-toggle-client-cookie" class="tool-btn needs-cookies"        title="Toggle pcty_audience=client cookie">
        Client Cookie
      </button>
      <button id="btn-purge-cache"          class="tool-btn needs-admin needs-page" title="Purge CDN cache for current path">
        Purge Cache
      </button>
    </div>

    <!-- Right column: Quick Links -->
    <div class="col">
      <div class="col-header">Links</div>

      <button id="btn-prod-author"          class="tool-btn needs-configured"     title="Go to Production Author">
        Prod Author
      </button>
      <button id="btn-stage-author"         class="tool-btn needs-configured"     title="Go to Stage Author">
        Stage Author
      </button>
      <button id="btn-dev-author"           class="tool-btn needs-configured"     title="Go to Dev Author">
        Dev Author
      </button>
      <button id="btn-cloud-manager"        class="tool-btn needs-developer"      title="Open Adobe Cloud Manager">
        Cloud Manager
      </button>
      <button id="btn-adobe-target"         class="tool-btn needs-developer"      title="Open Adobe Target">
        Adobe Target
      </button>
      <button id="btn-admin-console"        class="tool-btn needs-admin"          title="Open Adobe Admin Console">
        Admin Console
      </button>
    </div>

  </div><!-- /#toolbar -->

  <!-- ── No-config notice ────────────────────────────────────────────────── -->
  <div id="no-config-msg">
    <p>Configure your AEM environment to unlock all features.</p>
    <button id="btn-open-options-msg">Open Options</button>
  </div>

  <!-- Scripts loaded last so DOM is ready -->
  <script src="src/utils/browserUtil.js"></script>
  <script src="src/utils/aemState.js"></script>
  <script src="src/utils/helperUtils.js"></script>
  <script src="src/tools/wcmmode.js"></script>
  <script src="src/tools/go-to.js"></script>
  <script src="src/tools/cache-buster.js"></script>
  <script src="src/tools/publish.js"></script>
  <script src="src/tools/json.js"></script>
  <script src="src/tools/toggle-client.js"></script>
  <script src="src/tools/purge-cache.js"></script>
  <script src="popup.js"></script>
</body>
</html>
